<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Feedback Form</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>User Feedback</h1>
<form id="feedback-form">

<label>Name:</label>
<input type="text" id="name">
<span class="tooltip" id="name-tip">Enter your full name</span>
<br>

<label>Email:</label>
<input type="email" id="email">
<span class="tooltip id="email-tip">Enter a valid email</span>
<br>

<label>Comments:</label>
<textarea id="comments" maxlength="200"></textarea>
<p>Character count: <span id="char-count">0</span></p>

<button type="submit">Submit Feedback</button>
</form>

<h2>Feedback Submitted</h2>
<div id="feedback-display"></div>

<script src="cp_1.js"></script>





</body>
</html>
